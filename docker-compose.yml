services:
  backend:
    build:
      context: ./backend
      dockerfile: ../Dockerfile.backend
    ports:
      - "5000:5000"
    env_file:
      - ./backend/.env
    depends_on:
      - parser
      - redis
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:5000/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  parser:
    build:
      context: ./parser
      dockerfile: ../Dockerfile.parser
    ports:
      - "5001:5001"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5001/health')"]
      interval: 30s
      timeout: 5s
      retries: 3

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    restart: unless-stopped
    volumes:
      - redis-data:/data

  frontend:
    build:
      context: ./frontend
      dockerfile: ../Dockerfile.frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped

  # Standalone worker (optional — for horizontal scaling)
  # Scale with: docker-compose up --scale worker=3
  worker:
    build:
      context: ./backend
      dockerfile: ../Dockerfile.backend
    command: ["node", "src/jobs/workerEntry.js"]
    env_file:
      - ./backend/.env
    environment:
      - ASYNC_UPLOAD=true
      - WORKER_CONCURRENCY=3
    depends_on:
      - redis
      - parser
    restart: unless-stopped

volumes:
  redis-data:
